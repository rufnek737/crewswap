name = "crewswap-api"
main = "index.js"
compatibility_date = "2025-06-17"

# KV 네임스페이스: 아래 id는 `npx wrangler kv namespace create POSTS` 실행 후 교체
[[kv_namespaces]]
binding = "POSTS"
id = "PLACEHOLDER_REPLACE_WITH_KV_ID"

# 환경변수는 평문 vars 대신 secret으로 설정 (wrangler secret put VERIFY_SECRET 등)
# 로컬 개발용 .dev.vars 파일에 아래 형식으로 작성:
#   VERIFY_SECRET=your-secret
#   RESEND_API_KEY=re_xxxx
#   RESEND_FROM=CrewSwap <noreply@yourdomain.com>
